name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: ./gradlew jar

      - name: Build distribution archive
        run: ./gradlew installDist

      - name: Package distribution as zip
        run: |
          cd build/install
          zip -r ../../jetbrains-task-${{ github.ref_name }}.zip jetbrains-task/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            jetbrains-task-${{ github.ref_name }}.zip
            build/libs/*.jar
